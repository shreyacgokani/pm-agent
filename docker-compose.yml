services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pmagent
      POSTGRES_PASSWORD: pmagent
      POSTGRES_DB: pmagent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  pgdata:
